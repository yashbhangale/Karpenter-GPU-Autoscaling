apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: demo-model-a-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: demo-model-a
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Pods
      pods:
        metric:
          name: fastapi_http_requests_per_minute
        target:
          type: AverageValue
          averageValue: "50"
